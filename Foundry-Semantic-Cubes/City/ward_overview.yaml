# ─────────────────────────────────────────────────────────────────
#  Ward Overview Cube
#  Time-attributed by: record_time
#  Source view: city__local.boundaries_atomic_view
# ─────────────────────────────────────────────────────────────────

cubes:
  - name: ward_overview
    sql_table: city__local.boundaries_atomic_view
    description: >
      Ward-level demographics and governance — population, area,
      councillor assignments. Serves as the geographic join key
      for cross-departmental analysis.

    dimensions:
      - name: ward_id
        sql: ward_id
        type: number
        primary_key: true

      - name: record_time
        sql: record_time
        type: time

      - name: ward_number
        sql: ward_number
        type: string

      - name: ward_name
        sql: ward_name
        type: string

      - name: councillor
        sql: councillor
        type: string

    measures:
      - name: total_wards
        sql: ward_id
        type: count

      - name: total_population
        sql: population
        type: sum

      - name: avg_population_per_ward
        sql: population
        type: avg

      - name: total_residential_households
        sql: residential_households
        type: sum

      - name: total_voters
        sql: voters
        type: sum

      - name: avg_voters_per_ward
        sql: voters
        type: avg
