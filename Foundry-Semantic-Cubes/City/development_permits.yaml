# ─────────────────────────────────────────────────────────────────
#  Development Permits Cube
#  Time-attributed by: record_time (issued or application date)
#  Source view: city__local.development_details_view
# ─────────────────────────────────────────────────────────────────

cubes:
  - name: development_permits
    sql_table: city__local.development_details_view
    description: >
      Building permits enriched with ward demographics and infrastructure
      capacity metrics.  Enables housing-vs-infrastructure analysis.

    dimensions:
      - name: permit_id
        sql: permit_id
        type: number
        primary_key: true

      - name: record_time
        sql: record_time
        type: time
        description: "Primary time dimension — issued date or application date."

      - name: application_date
        sql: application_date
        type: time

      - name: issued_date
        sql: issued_date
        type: time

      - name: permit_number
        sql: permit_number
        type: string

      - name: permit_type
        sql: permit_type
        type: string

      - name: permit_status
        sql: permit_status
        type: string

      - name: work_type
        sql: work_type
        type: string

      - name: sub_work_type
        sql: sub_work_type
        type: string

      - name: permit_description
        sql: permit_description
        type: string

      - name: address
        sql: address
        type: string

      - name: issue_year
        sql: issue_year
        type: number

    measures:
      - name: total_permits
        sql: permit_id
        type: count

      - name: total_construction_value
        sql: construction_value
        type: sum

      - name: avg_construction_value
        sql: construction_value
        type: avg

      - name: total_units_created
        sql: units_created
        type: sum

      - name: total_units
        sql: total_units
        type: sum

      - name: residential_permits
        sql: "CASE WHEN permit_type ILIKE '%residential%' THEN 1 ELSE 0 END"
        type: sum

      - name: commercial_permits
        sql: "CASE WHEN permit_type ILIKE '%commercial%' THEN 1 ELSE 0 END"
        type: sum

      - name: completed_permits
        sql: "CASE WHEN permit_status ILIKE '%complete%' THEN 1 ELSE 0 END"
        type: sum

      - name: year_permits_count
        sql: total_permits
        type: max
        description: "Total permits in the same issue year (pre-aggregated)."

      - name: year_construction_value
        sql: total_construction_value
        type: max
        description: "Total construction value in the same issue year."

      - name: year_units_created
        sql: total_units_created
        type: max
        description: "Total units created in the same issue year."
