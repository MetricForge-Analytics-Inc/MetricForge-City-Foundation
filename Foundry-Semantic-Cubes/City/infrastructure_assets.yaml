# ─────────────────────────────────────────────────────────────────
#  Infrastructure Assets Cube
#  Time-attributed by: record_time (last edit / creation)
#  Source view: city__local.infrastructure_integration_view
# ─────────────────────────────────────────────────────────────────

cubes:
  - name: infrastructure_assets
    sql_table: city__local.infrastructure_integration_view
    description: >
      Cross-departmental infrastructure view joining roads, water mains
      and ward boundaries.  Time-attributed by record update time.

    dimensions:
      - name: road_id
        sql: road_id
        type: number
        primary_key: true

      - name: record_time
        sql: record_time
        type: time
        description: "Primary time dimension — last edit or creation timestamp."

      - name: road_name
        sql: road_name
        type: string

      - name: road_classification
        sql: road_classification
        type: string

      - name: surface_type
        sql: surface_type
        type: string

      - name: category
        sql: category
        type: string

      - name: subcategory
        sql: subcategory
        type: string

      - name: number_of_lanes
        sql: number_of_lanes
        type: number

      - name: speed_limit_kmh
        sql: speed_limit_kmh
        type: number

      - name: pavement_width_m
        sql: pavement_width_m
        type: number

      - name: road_ownership
        sql: road_ownership
        type: string

      - name: road_status
        sql: road_status
        type: string

      - name: ward_id
        sql: ward_id
        type: number

      - name: ward_name
        sql: ward_name
        type: string

      - name: councillor
        sql: councillor
        type: string

    measures:
      - name: total_road_segments
        sql: road_id
        type: count
        description: "Total number of road segments."

      - name: total_water_mains_in_ward
        sql: total_water_mains
        type: max
        description: "Water mains count (pre-aggregated across all wards)."

      - name: distinct_pipe_materials
        sql: distinct_materials
        type: max
        description: "Number of distinct pipe materials in the water network."

      - name: ward_population
        sql: ward_population
        type: max

      - name: ward_households
        sql: ward_households
        type: max
