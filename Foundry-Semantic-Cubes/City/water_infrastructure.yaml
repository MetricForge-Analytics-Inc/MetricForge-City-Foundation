# ─────────────────────────────────────────────────────────────────
#  Water Infrastructure Cube
#  Time-attributed by: record_time
#  Source view: city__local.water_mains_atomic_view
# ─────────────────────────────────────────────────────────────────

cubes:
  - name: water_infrastructure
    sql_table: city__local.water_mains_atomic_view
    description: >
      Water distribution main pipes — age analysis, material
      breakdown, and capacity indicators by ward.

    dimensions:
      - name: main_id
        sql: main_id
        type: number
        primary_key: true

      - name: record_time
        sql: record_time
        type: time

      - name: install_date
        sql: install_date
        type: time

      - name: pipe_material
        sql: pipe_material
        type: string

      - name: pipe_status
        sql: pipe_status
        type: string

      - name: pressure_zone
        sql: pressure_zone
        type: string

      - name: ownership
        sql: ownership
        type: string

      - name: category
        sql: category
        type: string

      - name: lined
        sql: lined
        type: string

      - name: pipe_size
        sql: "CAST(pipe_size AS DOUBLE)"
        type: number

      - name: condition_score
        sql: "CAST(condition_score AS DOUBLE)"
        type: number

      - name: criticality
        sql: "CAST(criticality AS DOUBLE)"
        type: number

    measures:
      - name: total_mains
        sql: main_id
        type: count

      - name: avg_pipe_size
        sql: "CAST(pipe_size AS DOUBLE)"
        type: avg

      - name: avg_condition_score
        sql: "CAST(condition_score AS DOUBLE)"
        type: avg

      - name: avg_criticality
        sql: "CAST(criticality AS DOUBLE)"
        type: avg

      - name: oldest_install_date
        sql: install_date
        type: min

      - name: newest_install_date
        sql: install_date
        type: max

      - name: avg_pipe_age_years
        sql: "date_diff('year', install_date, current_date)"
        type: avg
        description: "Average age of water mains in years."
