name: build-sqlmesh-container-image

on:
  push:
    branches:
      - main
      - "alex/containerize-front-end"
    paths:
      - 'Foundry-Semantic-Cubes/**'
      - 'Foundry-Visualization/**'
      - '.github/workflows/build-front-end-viz.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: front-end

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare lowercase and sanitized variables
        id: vars
        run: |
          # 1. Lowercase the repository name (fixes GHCR uppercase owner/repo error)
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
          # 2. Lowercase branch name and replace slashes with dashes (Docker tags cannot contain slashes)
          echo "branch=$(echo '${{ github.ref_name }}' | tr '[:upper:]' '[:lower:]' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=${{ env.IMAGE_NAME }}--${{ steps.vars.outputs.branch }}-,suffix=-${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Foundry-Visualization/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Echo full image tags
        run: |
          echo "Successfully built and pushed the following images:"
          echo "${{ steps.meta.outputs.tags }}"