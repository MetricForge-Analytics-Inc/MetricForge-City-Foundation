gateways:
  motherduck:
    connection:
      # For more information on configuring the connection to your execution engine, visit:
      # https://sqlmesh.readthedocs.io/en/stable/reference/configuration/#connections
      # https://sqlmesh.readthedocs.io/en/stable/integrations/engines/motherduck/#prerequisites
      type: motherduck
      token: {{env_var('MOTHERDUCK_TOKEN')}}
    state_connection:
      type: postgres
      host: {{env_var('SQLMESH_POSTGRES_HOST')}}
      port: {{env_var('SQLMESH_POSTGRES_PORT')}}
      user: {{env_var('SQLMESH_POSTGRES_USER')}}
      password: {{env_var('SQLMESH_POSTGRES_PASSWORD')}}
      database: {{env_var('SQLMESH_POSTGRES_DATABASE')}}


default_gateway: motherduck
default_target_environment: {{ env_var('CODESPACE_NAME') }}

# --- Model Defaults ---
# https://sqlmesh.readthedocs.io/en/stable/reference/model_configuration/#model-defaults

model_defaults:
  dialect: duckdb
  start: '2020-01-01'  # Default backfill start — individual models can override
  cron: '@daily'        # Run models daily at 12am UTC

# --- Linting Rules ---
# Enforce standards for your team
# https://sqlmesh.readthedocs.io/en/stable/guides/linter/

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
    - noambiguousprojections

